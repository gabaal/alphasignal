<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Optimizer | Premium Dispatch Suite</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Panel -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="logo-area">
                    <span class="logo-icon">⚡</span>
                    <h1>Route<span>Optimizer</span></h1>
                </div>
                <p class="tagline">Smart dispatch & route optimizer for mobile trades</p>
            </header>

            <main class="sidebar-content">
                <!-- Date Selector Card -->
                <section class="control-card date-card">
                    <div class="date-header">
                        <div style="display: flex; align-items: center;">
                            <span class="calendar-icon">📅</span>
                            <h2 id="current-date-display" style="margin-bottom: 0;">Tuesday, Jun 16</h2>
                        </div>
                        <input type="date" id="calendar-picker" class="hidden-date-picker">
                        <button type="button" id="calendar-trigger-btn" class="picker-trigger-btn">📅</button>
                    </div>
                    <div class="week-ribbon" id="week-ribbon">
                        <!-- Generated dynamically by app.js -->
                    </div>
                </section>

                <!-- Add Job Form -->
                <section class="control-card input-card">
                    <h2>Add Stop</h2>

                    <form id="job-form">
                        <div class="input-group">
                            <label for="client-name">Client Name</label>
                            <input type="text" id="client-name" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="input-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" placeholder="e.g. 100 Main St, City" required>
                        </div>
                        <div class="input-group">
                            <label for="phone">Phone (for WhatsApp)</label>
                            <input type="tel" id="phone" placeholder="e.g. +1234567890" required>
                        </div>
                        <div class="input-group">
                            <label for="task-details">Task / Notes</label>
                            <input type="text" id="task-details" placeholder="e.g. Sink Leak Repair" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Stop to List</button>
                    </form>
                </section>

                <!-- Optimization Stats Card -->
                <section class="control-card stats-card" id="stats-panel" style="display: none;">
                    <div class="stats-badge">
                        <span class="badge-icon">🎉</span>
                        <span id="savings-text">Route Optimized!</span>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <span class="stat-label">Total Distance</span>
                            <span class="stat-val" id="stat-distance">0.0 mi</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Est. Drive Time</span>
                            <span class="stat-val" id="stat-time">0m</span>
                        </div>
                    </div>
                    <div class="action-row">
                        <button id="optimize-btn" class="btn btn-accent">Optimize Route</button>
                        <button id="clear-btn" class="btn btn-secondary">Clear All</button>
                    </div>
                </section>

                <!-- Itinerary Stops List -->
                <section class="itinerary-section">
                    <div class="itinerary-header">
                        <h2>Your Itinerary</h2>
                        <div class="start-time-group">
                            <label for="start-time">Start Time</label>
                            <input type="time" id="start-time" value="08:00">
                        </div>
                    </div>
                    <div id="stops-list" class="stops-list">
                        <div class="empty-state">
                            <span class="empty-icon">📍</span>
                            <p>No stops added yet. Add your jobs to generate an optimized route.</p>
                        </div>
                    </div>
                </section>
            </main>
        </aside>

        <!-- Map Container -->
        <main class="map-wrapper">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet Map JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
